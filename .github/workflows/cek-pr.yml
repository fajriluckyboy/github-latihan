name: Cek Pull Request

on:
  pull_request:
    branches:
      - master

jobs:
  cek:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cek isi repo
        run: ls -la

      - name: Cetak info PR
        run: |
          echo "PR dari branch: ${{ github.head_ref }}"
          echo "PR menuju branch: ${{ github.base_ref }}"
          echo "Dibuat oleh: ${{ github.actor }}"
