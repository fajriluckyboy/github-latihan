name: Bulk Issue Report Mingguan

# Jalankan otomatis setiap Senin jam 08.00 WIB (01.00 UTC)
# Bisa juga dijalankan manual via workflow_dispatch
on:
  schedule:
    - cron: "0 1 * * 1"
  workflow_dispatch:    # tombol "Run workflow" manual di GitHub UI

jobs:
  report:
    runs-on: ubuntu-latest

    # Izin minimal: hanya perlu baca issues
    permissions:
      issues: read

    steps:
      # Checkout repo agar file script tersedia di runner
      - name: Checkout repo
        uses: actions/checkout@v4

      # Setup Node.js dengan cache npm untuk percepat install
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # Install dependencies termasuk @octokit/action
      - name: Install dependencies
        run: npm install

      # Jalankan script bulk-issue-report.js
      # Hasilnya akan muncul di log Actions
      - name: Jalankan bulk issue report
        run: node .github/scripts/bulk-issue-report.js
        env:
          # Token otomatis dari Actions untuk autentikasi API
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
